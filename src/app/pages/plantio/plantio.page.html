<section class="plantio">
  <section class="missions-panel" aria-label="Missoes">
    <header class="missions-header">
      <h1>Miss&otilde;es</h1>
    </header>

    <div class="mission-list">
      <article
        class="mission-item"
        *ngFor="let mission of missions(); trackBy: trackById"
        [style.--accent]="mission.accent"
      >
        <div class="mission-icon">
          <img [src]="mission.icon" [alt]="mission.alt" />
        </div>
        <div class="mission-content">
          <h2 [innerHTML]="mission.title"></h2>
          <p [innerHTML]="mission.subtitle"></p>
          <div class="mission-progress">
            <span class="progress-label">{{ mission.progressLabel }}</span>
            <span class="progress-track">
              <span class="progress-fill" [style.width.%]="mission.progress"></span>
            </span>
          </div>
        </div>
        <div class="mission-xp" aria-label="Recompensa">
          <span class="xp-value">{{ mission.xp }}</span>
          <span class="xp-label">XP</span>
        </div>
      </article>
    </div>

    <section class="score-card" aria-label="Pontuacao atual">
      <h2>Pontua&ccedil;&atilde;o atual</h2>
      <div class="score-row">
        <div class="level-badge" aria-label="Nivel">
          <span class="level-label">LVL</span>
          <span class="level-value">{{ score().level }}</span>
        </div>
        <div class="user-badge">
          <span class="avatar">
            <img [src]="score().avatar" alt="Usuario" />
          </span>
          <span class="user-name">{{ score().name }}</span>
        </div>
        <span class="score-total">{{ score().total }} XP</span>
      </div>
    </section>

    <button class="missions-cta" type="button">Completar Miss&otilde;es</button>
  </section>

  <app-home-bottom-nav></app-home-bottom-nav>
</section>
